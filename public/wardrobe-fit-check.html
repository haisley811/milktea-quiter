<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>服饰五阶段适配验收</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #f7f4fb; color: #4c3575; font-family: system-ui, sans-serif; }
      main { width: min(1500px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 40px; }
      h1, p { margin: 0; }
      header { margin-bottom: 20px; }
      header p { margin-top: 6px; color: #806a9f; }
      .matrix { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
      .card { min-width: 0; border: 1px solid #e7d8ff; border-radius: 8px; background: #fff; padding: 10px; }
      .meta { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; font-size: 12px; font-weight: 800; }
      .avatar { position: relative; overflow: hidden; width: 100%; aspect-ratio: 2 / 3; border-radius: 6px; background: linear-gradient(135deg,#ddf8f5,#fff 48%,#f3e8ff); }
      .dressed { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; pointer-events: none; }
    </style>
  </head>
  <body>
    <main>
      <header><h1>完整换装角色 × Body Score 五阶段</h1><p>10 套服饰 × 5 个体型，共 50 张独立完整角色 PNG；不使用服饰覆盖图层。</p></header>
      <section class="matrix" id="matrix"></section>
    </main>
    <script>
      const outfits = [
        ["kpop-lilac","薰衣草舞台"],
        ["hanfu-cloud","云纹汉服"],
        ["denim-street","丹宁街头"],
        ["ballet-pink","芭蕾粉雾"],
        ["coquette-red","樱桃蝴蝶结"],
        ["techwear-black","夜行机能"],
        ["summer-sundress","夏日奶油花"],
        ["office-chic","珍珠通勤"],
        ["idol-silver","银曜偶像"],
        ["winter-coat","冰蓝暖冬"]
      ];
      document.querySelector("#matrix").innerHTML = outfits.flatMap(([id,name]) =>
        [1,2,3,4,5].map(stage => `<article class="card"><div class="meta"><span>${name}</span><span>S${stage}</span></div><div class="avatar"><img class="dressed" src="images/dressed/${id}-stage-${stage}.png" alt="${name} S${stage} 完整角色" /></div></article>`)
      ).join("");
    </script>
  </body>
</html>
